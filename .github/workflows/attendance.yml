name: Daily Attendance Check

on:
  schedule:
    # 4:00 UTC = 9:30 AM IST
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  check-attendance:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install selenium requests
        
      - name: Run Attendance Script
        env:
          USER_ID: ${{ secrets.USER_ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check.py
        
      - name: Update Memory File
        run: |
          git config --global user.name "Attendance Bot"
          git config --global user.email "actions@github.com"
          git add last_attendance.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update attendance memory [skip ci]" && git push)