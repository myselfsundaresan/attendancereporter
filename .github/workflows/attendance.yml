name: Daily Attendance Check

on:
  schedule:
    # Runs at 3:30, 5:30, and 8:30 UTC (9am, 11am, 2pm IST)
    - cron: '30 3,5,8 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  check-attendance:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install selenium requests
        
      - name: Run Attendance Script
        env:
          USER_ID: ${{ secrets.USER_ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check.py
        
      - name: Update Memory File
        run: |
          git config --global user.name "Attendance Bot"
          git config --global user.email "actions@github.com"
          
          # Stage the memory file
          git add last_attendance.txt
          
          # Only run git operations if there are actual changes
          if ! git diff --quiet --staged; then
            echo "📝 Changes detected. preparing to commit..."
            
            git commit -m "Update attendance memory [skip ci]"
            
            # --- THE FIX: Pull latest changes first to prevent conflicts ---
            git pull --rebase origin main
            
            # Now push
            git push
          else
            echo "💤 No changes to save."
          fi
